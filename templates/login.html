{% extends "base.html" %}

{% block body %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="OKR Tracker">
    </div>
    <h2 class="login-title">OKR Tracker</h2>
    <p class="login-subtitle">Sign in to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="flash-msg {{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login_page') }}">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-input" id="email" name="email" required autocomplete="email" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-input" id="password" name="password" required autocomplete="current-password">
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="remember" name="remember" checked>
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="padding:12px;">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
